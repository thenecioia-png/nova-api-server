services:
  - type: web
    name: nova-api-server
    env: node
    buildCommand: npm install -g pnpm@9 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production

  - type: static_site
    name: nova-frontend
    buildCommand: npm install -g pnpm@9 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/asistente-ia run build
    staticPublishPath: ./artifacts/asistente-ia/dist/public
    envVars:
      - key: VITE_API_URL
        value: https://nova-api-server.onrender.com
      - key: STATIC_BUILD
        value: "1"
      - key: NODE_ENV
        value: production
